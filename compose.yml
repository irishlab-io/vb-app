---
name: vb-app

networks:
  vuln_network:
    driver: bridge

services:
  vb-app:
    container_name: vuln-app
    build: .
    restart: unless-stopped
    networks:
      - vuln_network
    ports:
      - "5000:5000"
      - "80:5000"
    environment:
      - DB_NAME=vuln_bank
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - OLLAMA_URL=http://ai:11434
      - OLLAMA_MODEL=llama3.2
    volumes:
      - ./src/vuln_bank/static/uploads:/app/src/vuln_bank/static/uploads
    depends_on:
      vb-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  vb-db:
    container_name: vuln-db
    image: docker.io/postgres:13
    restart: unless-stopped
    networks:
      - vuln_network
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=vuln_bank
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vuln_bank"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  vb-ai:
    container_name: vuln-ai
    image: docker.io/ollama/ollama:0.22.1
    restart: unless-stopped
    networks:
      - vuln_network
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
  ollama_data:
