---
name: vuln_bank

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
      - "80:5000"

    environment:
      - DB_NAME=vuln_bank
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - OLLAMA_URL=http://ai:11434
      - OLLAMA_MODEL=llama3.2
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:5000/healthz', timeout=5).getcode() == 200 else sys.exit(1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./src/vuln_bank/static/uploads:/app/src/vuln_bank/static/uploads
    networks:
      - vuln_network

  db:
    image: docker.io/postgres:13
    restart: unless-stopped
    environment:
      - POSTGRES_DB=vuln_bank
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vuln_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vuln_bank"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ai:
    image: docker.io/ollama/ollama:0.22.1
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - vuln_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
  ollama_data:

networks:
  vuln_network:
    driver: bridge
